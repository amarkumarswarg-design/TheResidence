<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#0d0d0d;--paper:#f7f4ef;--gold:#b89a5a;--gold2:#d4b87a;--muted:#7a7060;--line:#e2ddd4;--white:#ffffff;}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--paper);color:var(--ink);overflow-x:hidden;}
.lang-bar{position:fixed;top:1.2rem;right:1.4rem;z-index:999;display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--white);box-shadow:0 2px 12px rgba(0,0,0,.08);}
.lang-btn{padding:.35rem .9rem;font-size:.75rem;font-weight:500;letter-spacing:.06em;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:.2s;font-family:'Outfit',sans-serif;}
.lang-btn.active{background:var(--ink);color:var(--white);}
.hero{min-height:100vh;background:var(--ink);display:grid;place-items:center;text-align:center;padding:2rem;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;}
.hero-bg-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.45),rgba(0,0,0,.65));}
.hero-glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,#b89a5a18,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 6s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.15);}}
.hero-content{position:relative;z-index:1;}
.hero-eyebrow{font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:1.8rem;opacity:0;animation:up .9s ease .2s forwards;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,10vw,8rem);font-weight:300;color:var(--white);line-height:1;letter-spacing:-.02em;margin-bottom:.5rem;opacity:0;animation:up .9s ease .4s forwards;}
.hero h1 em{font-style:italic;color:var(--gold2);}
.hero-sub{font-size:clamp(.85rem,2vw,1.05rem);font-weight:300;color:#ccc;max-width:420px;line-height:1.8;margin:.8rem auto 2.8rem;opacity:0;animation:up .9s ease .6s forwards;}
.hero-cta{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;opacity:0;animation:up .9s ease .8s forwards;}
.btn-primary{background:var(--gold);color:var(--ink);font-weight:600;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;padding:.85rem 2.2rem;border-radius:999px;border:none;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .2s;font-family:'Outfit',sans-serif;display:inline-block;}

.btn-ghost{background:transparent;color:var(--white);font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;padding:.85rem 2.2rem;border-radius:999px;border:1px solid #ffffff25;cursor:pointer;text-decoration:none;transition:.2s;font-family:'Outfit',sans-serif;display:inline-block;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.scroll-down{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);color:#aaa;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:.5rem;animation:fadeIn 1s ease 1.5s both;}
.scroll-down span{width:1px;height:40px;background:linear-gradient(to bottom,var(--gold),transparent);animation:drip 2s ease-in-out infinite;}
.section{padding:6rem 1.5rem;}
.label{font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;}
.heading{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:400;line-height:1.15;}
.subtext{color:var(--muted);font-size:.95rem;line-height:1.8;max-width:520px;}
.flats-section{background:var(--white);}
.flats-head{text-align:center;margin-bottom:4rem;}
.flats-head .subtext{margin:1rem auto 0;}
.flats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;max-width:1000px;margin:0 auto;}
.flat-card{border:1px solid var(--line);border-radius:1rem;overflow:hidden;background:var(--paper);cursor:pointer;transition:transform .3s,box-shadow .3s,border-color .3s;}

.card-visual{height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;position:relative;overflow:hidden;}
.card-visual.style-a{background:linear-gradient(135deg,#1a1208,#3d2a0a);}
.card-visual.style-b{background:linear-gradient(135deg,#0d1a12,#0a3d2a);}
.card-visual.style-c{background:linear-gradient(135deg,#0d0d1a,#1a0a3d);}
.card-visual img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.card-visual-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent);}
.card-floor-icon{font-size:3rem;position:relative;z-index:1;}
.avail-badge{position:absolute;top:1rem;left:1rem;font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .75rem;border-radius:999px;z-index:2;}
.avail-badge.yes{background:#1a6e3a;color:#fff;}
.avail-badge.no{background:#8b1a1a;color:#fff;}
.card-body{padding:1.6rem;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;margin-bottom:.15rem;}
.card-floor-tag{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1.2rem;}
.card-price{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--gold);line-height:1;}
.card-price-mo{font-size:.78rem;color:var(--muted);font-family:'Outfit',sans-serif;font-weight:400;margin-left:.2rem;}
.card-teaser{margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid var(--line);display:flex;gap:.5rem;flex-wrap:wrap;}
.teaser-tag{font-size:.7rem;background:var(--white);border:1px solid var(--line);color:var(--muted);padding:.22rem .6rem;border-radius:999px;}

.detail-rules li::before{content:'–';position:absolute;left:0;color:var(--gold);}
.slider{position:relative;margin-bottom:2rem;}
.slider-track{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;padding-bottom:.5rem;}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;}

.lightbox-close:hover{opacity:1;}
.lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:2rem;cursor:pointer;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.2s;}
.lightbox-prev{left:1rem;}.lightbox-next{right:1rem;}
.lightbox-prev:hover,.lightbox-next:hover{background:rgba(255,255,255,.25);}
.lightbox-counter{color:rgba(255,255,255,.5);font-size:.8rem;margin-top:.75rem;}
.questions-section{background:var(--white);}
.questions-inner{max-width:700px;margin:0 auto;}
.questions-inner .subtext{margin-bottom:2.5rem;}
.q-form{background:var(--paper);border:1px solid var(--line);border-radius:1rem;padding:2rem;margin-bottom:3rem;}

.q-form input:focus,.q-form textarea:focus{border-color:var(--gold);}
.q-form textarea{min-height:100px;resize:vertical;}
.q-form .row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

.q-submit{width:100%;background:var(--ink);color:var(--white);border:none;padding:.9rem;border-radius:.6rem;font-size:.9rem;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:.2s;}

.q-success{display:none;text-align:center;color:#1a6e3a;font-size:.9rem;padding:1rem;background:#e8f5ee;border-radius:.6rem;margin-top:1rem;}
.q-list{display:flex;flex-direction:column;gap:1.2rem;}
.q-item{background:var(--paper);border:1px solid var(--line);border-radius:.75rem;padding:1.2rem 1.5rem;}
.q-item-name{font-weight:600;font-size:.9rem;margin-bottom:.2rem;}

.q-item-reply-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem;}
.q-item-time{font-size:.7rem;color:#bbb;margin-top:.5rem;}
.no-questions{color:var(--muted);font-size:.88rem;font-style:italic;text-align:center;padding:2rem;}
.location-section{background:var(--paper);}
.location-inner{max-width:900px;margin:0 auto;}
.map-wrap{margin-top:2.5rem;border-radius:1rem;overflow:hidden;border:1px solid var(--line);height:360px;}
.map-wrap iframe{width:100%;height:100%;border:none;}
.loc-chips{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:1.5rem;}
.loc-chip{display:flex;align-items:center;gap:.4rem;background:var(--white);border:1px solid var(--line);padding:.45rem 1rem;border-radius:999px;font-size:.8rem;color:var(--muted);}

.contact-mail{display:inline-flex;align-items:center;gap:.75rem;background:var(--gold);color:var(--ink);text-decoration:none;padding:1.1rem 2.8rem;border-radius:999px;font-size:1rem;font-weight:600;transition:transform .2s,box-shadow .2s;font-family:'Outfit',sans-serif;}

.contact-note{color:#555;font-size:.78rem;margin-top:1rem;}
footer{background:#080808;padding:1.8rem;text-align:center;font-size:.75rem;color:#3a3530;letter-spacing:.05em;}
footer strong{color:var(--gold);}
.main-page{display:block;}
.main-page.hidden{display:none;}
.loading{text-align:center;color:var(--muted);padding:3rem;font-size:.9rem;}
@keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

  hi:{

    qa_label:'सवाल-जवाब',qa_heading:'कोई सवाल है?',

  }
};

function g(key){
  const s=siteSettings;
  if(lang==='hi'){
    const v=s[key+'_hi'];
    if(v&&v.trim())return v;
    return D.hi[key]||D.en[key]||'';
  }
  const v=s[key];
  if(v&&v.trim())return v;
  return D.en[key]||'';
}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  applySettings();
}

async function loadSettings(){
  try{
    const{data}=await sb.from('settings').select('*');
    if(data&&data.length){
      data.forEach(row=>{
        try{const val=JSON.parse(row.value);if(row.key==='site')siteSettings=val;}
        catch(e){}
      });
    }
  }catch(e){}
  applySettings();
}

function applySettings(){
  const cover=siteSettings.hero_cover;
  if(cover)document.getElementById('heroBg').style.backgroundImage=`url('${cover}')`;
  setHtml('heroEyebrow',g('hero_eyebrow'));
  setHtml('heroTitle',g('hero_title'));
  setText('heroSub',g('hero_sub'));
  setText('heroBtn1',g('hero_btn1'));
  setText('heroBtn2',g('hero_btn2'));
  setText('flatsLabel',g('flats_label'));
  setHtml('flatsHeading',g('flats_heading'));
  setText('flatsSub',g('flats_sub'));
  setText('qaLabel',g('qa_label'));
  setHtml('qaHeading',g('qa_heading'));
  setText('qaSub',g('qa_sub'));
  setText('locLabel',g('loc_label'));
  setHtml('locHeading',g('loc_heading'));
  setText('locSub',g('loc_sub'));
  setText('contactLabel',g('contact_label'));
  setHtml('contactHeading',g('contact_heading'));
  setText('contactSub',g('contact_sub'));
  setText('contactNote',g('contact_note'));
  setText('footerName',g('footer_name'));
  setText('footerLocation',g('footer_location'));
  setText('footerNote',g('footer_note'));
  if(siteSettings.site_title)document.title=siteSettings.site_title;
  // loc chips
  const chips=siteSettings.loc_chips;
  const chipEl=document.getElementById('locChips');
  if(chips&&chips.length){
    chipEl.innerHTML=chips.map(c=>`<div class="loc-chip">${c}</div>`).join('');
  } else {
    chipEl.innerHTML=['🛍️ Zudio Mall ke paas','🏥 Sahabad Pathology ke saamne','🏪 Babu Bazar Market','🚌 Achha Transport'].map(c=>`<div class="loc-chip">${c}</div>`).join('');
  }
}

function setText(id,val){const el=document.getElementById(id);if(el)el.textContent=val||'';}
function setHtml(id,val){const el=document.getElementById(id);if(el)el.innerHTML=val||'';}

async function loadFlats(){
  const{data,error}=await sb.from('flats').select('*').order('id');
  if(error||!data){document.getElementById('flatsGrid').innerHTML='<p style="color:var(--muted);text-align:center;padding:2rem;">Flats load nahi ho sake.</p>';return;}
  allFlats=data;
  renderFlats(data);
}

function renderFlats(flats){
  const grid=document.getElementById('flatsGrid');
  if(!flats.length){grid.innerHTML='<p style="color:var(--muted);text-align:center;padding:2rem;">Koi flat uplabdh nahi.</p>';return;}
  grid.innerHTML=flats.map((f,i)=>`
    <div class="flat-card" onclick="openDetail('${f.id}')">
      <div class="card-visual ${STYLES[i%3]}">
        ${f.cover_photo?`<img src="${f.cover_photo}" alt="${f.name}"/><div class="card-visual-overlay"></div>`:`<div class="card-floor-icon">${ICONS[i%3]}</div>`}
        <div class="avail-badge ${f.available?'yes':'no'}">${f.available?'✓ Uplabdh':'✗ Bhara Hua'}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${f.name}</div>
        <div class="card-floor-tag">${f.floor} · ${f.facing} Facing</div>
        <div class="card-price">₹${f.price.toLocaleString()}<span class="card-price-mo">/maah</span></div>
        <div class="card-teaser">
          <span class="teaser-tag">${f.rooms||'2 Kamre'}</span>
          <span class="teaser-tag">${f.furnishing||'Unfurnished'}</span>
        </div>
        <button class="card-cta">Poori Jaankari →</button>
      </div>
    </div>`).join('');
}

async function openDetail(flatId){
  const flat=allFlats.find(f=>f.id===flatId);
  if(!flat)return;
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('detailPage').classList.add('active');
  window.scrollTo(0,0);
  const i=allFlats.indexOf(flat);
  const bg=document.getElementById('detailHeroBg');
  bg.className='detail-hero-bg '+(STYLES[i%3]);
  bg.innerHTML=flat.cover_photo?`<img src="${flat.cover_photo}" alt="${flat.name}"/>`:(ICONS[i%3]);
  const badge=document.getElementById('detailAvailBadge');
  badge.textContent=flat.available?'✓ Uplabdh':'✗ Bhara Hua';
  badge.style.cssText=`background:${flat.available?'#1a6e3a':'#8b1a1a'};color:#fff;`;
  document.getElementById('detailHeroName').textContent=flat.name;
  document.getElementById('detailHeroFloor').textContent=flat.floor+' · '+flat.facing+' Facing';
  document.getElementById('detailPrice').textContent='₹'+flat.price.toLocaleString();
  document.getElementById('detailDeposit').textContent='₹'+flat.deposit.toLocaleString();
  document.getElementById('detailGrid').innerHTML=[
    ['Prakar',flat.rooms],['Manzil',flat.floor],['Disha',flat.facing+' Facing'],
    ['Sajja',flat.furnishing],['Deposit','₹'+flat.deposit.toLocaleString()+' (Vapas)'],
    ['Uplabdhta',flat.available?'Turant':'Uplabdh Nahi'],
  ].map(([k,v])=>`<div class="detail-item"><div class="detail-item-label">${k}</div><div class="detail-item-val">${v||'—'}</div></div>`).join('')
  +(flat.extra_notes?`<div class="detail-item" style="grid-column:1/-1;"><div class="detail-item-label">Vishesh Jaankari</div><div class="detail-item-val">${flat.extra_notes}</div></div>`:'');
  const rules=siteSettings.rules?siteSettings.rules.split('\n').filter(r=>r.trim()):['Sirf parivaar — bachelor nahi','Pet allowed nahi','Koi dalaal nahi','Kiraya 5 tarikh tak'];
  document.getElementById('detailRules').innerHTML=rules.map(r=>`<li>${r}</li>`).join('');
  const mailBtn=document.getElementById('detailMailBtn');
  const subject=encodeURIComponent('Flat Enquiry: '+flat.name);
  const body=encodeURIComponent('Namaste,\n\nMujhe '+flat.name+' ke baare mein jaankari chahiye.\n\nNaam: \nPhone: \nSawaal: ');
  mailBtn.href=`mailto:Amar@hiamar.online?subject=${subject}&body=${body}`;
  const{data:photos}=await sb.from('photos').select('*').eq('flat_id',flatId).order('created_at');
  const photoDiv=document.getElementById('detailPhotos');
  if(photos&&photos.length){
    lightboxImages=photos.map(p=>p.url);
    photoDiv.innerHTML=`<div class="slider"><div class="slider-track">${photos.map((p,i)=>`<img class="slider-img" src="${p.url}" alt="Photo" onclick="openLightbox(${i})"/>`).join('')}</div></div>`;
  } else {
    lightboxImages=[];
    photoDiv.innerHTML='<p style="color:var(--muted);font-size:.88rem;font-style:italic;">Photos jald aayenge.</p>';
  }
}

function goBack(){
  document.getElementById('mainPage').classList.remove('hidden');
  document.getElementById('detailPage').classList.remove('active');
  window.scrollTo(0,0);
}

function openLightbox(index){
  lightboxIndex=index;
  document.getElementById('lightboxImg').src=lightboxImages[index];
  document.getElementById('lightboxCounter').textContent=`${index+1} / ${lightboxImages.length}`;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
function closeLightboxOutside(e){if(e.target===document.getElementById('lightbox'))closeLightbox();}
function lightboxNav(dir){
  lightboxIndex=(lightboxIndex+dir+lightboxImages.length)%lightboxImages.length;
  document.getElementById('lightboxImg').src=lightboxImages[lightboxIndex];
  document.getElementById('lightboxCounter').textContent=`${lightboxIndex+1} / ${lightboxImages.length}`;
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft')lightboxNav(-1);
  if(e.key==='ArrowRight')lightboxNav(1);
});

async function loadQuestions(){
  const{data,error}=await sb.from('questions').select('*').order('created_at',{ascending:false});
  const list=document.getElementById('qList');
  if(error||!data||!data.length){list.innerHTML='<div class="no-questions">Abhi koi sawaal nahi.</div>';return;}
  list.innerHTML=data.map(q=>`
    <div class="q-item">
      <div class="q-item-name">${esc(q.visitor_name)}</div>
      <div class="q-item-msg">${esc(q.message)}</div>
      ${q.replied&&q.reply?`<div class="q-item-reply"><div class="q-item-reply-label">The Residence</div>${esc(q.reply)}</div>`:''}
      <div class="q-item-time">${new Date(q.created_at).toLocaleDateString('hi-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
    </div>`).join('');
}

async function submitQuestion(){
  const name=document.getElementById('qName').value.trim();
  const phone=document.getElementById('qPhone').value.trim();
  const msg=document.getElementById('qMsg').value.trim();
  if(!name||!msg){alert('Naam aur sawaal likhein.');return;}
  const btn=document.querySelector('.q-submit');
  btn.textContent='Post ho raha hai...';btn.disabled=true;
  const{error}=await sb.from('questions').insert({visitor_name:name,visitor_email:phone||null,message:msg});
  btn.textContent='Sawaal Bhejein';btn.disabled=false;
  if(!error){
    document.getElementById('qName').value='';document.getElementById('qPhone').value='';document.getElementById('qMsg').value='';
    document.getElementById('qSuccess').style.display='block';
    setTimeout(()=>document.getElementById('qSuccess').style.display='none',4000);
    loadQuestions();
  }else alert('Sawaal post nahi ho saka. Dobara try karein.');
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

loadSettings();
loadFlats();
loadQuestions();
</script>
</body>
</html>
